<!DOCTYPE html>
<html>

<head>

    <title>VALORAA Admin Login</title>

    <link rel="stylesheet"
          href="../css/admin.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-box">

        <h1>VALORAA ADMIN</h1>

        <p>Admin Dashboard Login</p>

        <form id="adminLoginForm">

            <input type="email"
                   id="email"
                   placeholder="Admin Email"
                   required>

            <input type="password"
                   id="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

<script src="../javascript/admin-login.js"></script>

</body>
</html>
